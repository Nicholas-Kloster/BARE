name: CI

on:
  push:
  pull_request:

jobs:
  pipeline:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: ${{ runner.os }}-cargo-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ajv-cli
        run: npm install -g ajv-cli

      - name: Cache model weights
        id: cache-weights
        uses: actions/cache@v4
        with:
          path: assets/model.safetensors
          key: bert-all-MiniLM-L6-v2-weights

      - name: Download BERT model weights
        if: steps.cache-weights.outputs.cache-hit != 'true'
        run: |
          curl -L -o assets/model.safetensors \
            https://huggingface.co/sentence-transformers/all-MiniLM-L6-v2/resolve/main/model.safetensors
          ls -lh assets/

      - name: Run Rust unit tests
        run: cargo test --release

      - name: Build BARE
        run: cargo build --release

      - name: "[nuclei] Run adapter"
        run: |
          python adapters/nuclei/nuclei_to_bare.py \
            adapters/nuclei/examples/nuclei_sample.jsonl \
            > /tmp/nuclei_findings.json

      - name: "[nuclei] Validate findings.json against input schema"
        run: ajv validate -s schemas/input.schema.json -d /tmp/nuclei_findings.json

      - name: "[nuclei] Run BARE"
        run: target/release/bare /tmp/nuclei_findings.json > /tmp/nuclei_output.json

      - name: "[nuclei] Validate output.json against output schema"
        run: ajv validate -s schemas/output.schema.json -d /tmp/nuclei_output.json

      - name: "[nmap] Run adapter"
        run: |
          python adapters/nmap/nmap_to_bare.py \
            adapters/nmap/examples/nmap_sample.xml \
            > /tmp/nmap_findings.json

      - name: "[nmap] Validate findings.json against input schema"
        run: ajv validate -s schemas/input.schema.json -d /tmp/nmap_findings.json

      - name: "[nmap] Run BARE"
        run: target/release/bare /tmp/nmap_findings.json > /tmp/nmap_output.json

      - name: "[nmap] Validate output.json against output schema"
        run: ajv validate -s schemas/output.schema.json -d /tmp/nmap_output.json

      - name: "[shodan] Run adapter"
        run: |
          python adapters/shodan/shodan_to_bare.py \
            adapters/shodan/examples/shodan_sample.jsonl \
            > /tmp/shodan_findings.json

      - name: "[shodan] Validate findings.json against input schema"
        run: ajv validate -s schemas/input.schema.json -d /tmp/shodan_findings.json

      - name: "[shodan] Run BARE"
        run: target/release/bare /tmp/shodan_findings.json > /tmp/shodan_output.json

      - name: "[shodan] Validate output.json against output schema"
        run: ajv validate -s schemas/output.schema.json -d /tmp/shodan_output.json

      - name: Summary
        run: |
          for adapter in nuclei nmap shodan; do
            FINDING_COUNT=$(python -c "import json; print(len(json.load(open('/tmp/${adapter}_findings.json'))['findings']))")
            echo "${adapter}: findings=$(wc -c < /tmp/${adapter}_findings.json) bytes, ${FINDING_COUNT} records | output=$(wc -c < /tmp/${adapter}_output.json) bytes"
          done
